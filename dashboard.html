<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Monitoring</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css?v=2">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="dashboard">

  <div class="top-bar">
    <h1>ESP32 Temperature Monitor</h1>
    <div id="clock" class="clock"></div>
  </div>

  <div id="alertBox" class="alert-box"></div>

  <div class="card">
    <h2 id="suhu">-- °C</h2>
    <p id="status" class="status">Menunggu data...</p>
  </div>

  <canvas id="chart"></canvas>

  <button onclick="logout()">Logout</button>
</div>

<div class="sensor-grid">

  <div class="card">
    <h3>🌡️ Suhu</h3>
    <h2 id="suhu">-- °C</h2>
    <p id="statusSuhu"></p>
  </div>

  <div class="card">
    <h3>💧 Kelembapan</h3>
    <h2 id="humidity">-- %</h2>
    <p id="statusHumidity"></p>
  </div>

  <div class="card">
    <h3>⚡ Tegangan</h3>
    <h2 id="tegangan">-- V</h2>
    <p id="statusTegangan"></p>
  </div>

  <div class="card">
    <h3>🔋 Baterai</h3>
    <h2 id="baterai">-- %</h2>
    <p id="statusBaterai"></p>
  </div>

  <div class="card">
    <h3>🚪 Status Pintu</h3>
    <h2 id="pintu">--</h2>
  </div>

</div>

<script src="script.js?v=2"></script>
</body>
</html>
